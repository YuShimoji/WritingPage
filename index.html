<!doctype html>

<head>

  <title>Zen Writer - 小説執筆ツール</title>
  <script>
    (function () {
      // ?reset=1でlocalStorageをクリア
      if (/(?:^|[?&])reset=1(?:&|$)/.test(location.search)) {
        try {
          localStorage.clear();
          // クエリパラメータを削除してリロード
          var url = location.origin + location.pathname;
          location.replace(url);
          return;
        } catch (e) { /* ignore */ }
      }

      // 埋め込みモード判定（?embed=1）
      var isEmbed = /(?:^|[?&])embed=1(?:&|$)/.test(location.search);
      if (isEmbed) {
        document.documentElement.setAttribute('data-embed', 'true');
      }
      try {
        var raw = localStorage.getItem('zenWriter_settings');
        var settings = null;
        if (raw) {
          settings = JSON.parse(raw);
        }

        // テーマ設定（デフォルト: dark）
        var theme = settings && settings.theme ? settings.theme : 'dark';
        document.documentElement.setAttribute('data-theme', theme);

        // ツールバー設定
        if (settings && settings.toolbarVisible === false) {
          document.documentElement.setAttribute('data-toolbar-hidden', 'true');
        } else {
          document.documentElement.setAttribute('data-toolbar-hidden', 'false');
        }
      } catch (e) {
        // エラー時はデフォルトでダークモード
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.setAttribute('data-toolbar-hidden', 'false');
      }
      // 埋め込みモードではツールバーを強制的に隠す（最小UI）
      if (isEmbed) {
        document.documentElement.setAttribute('data-toolbar-hidden', 'true');
      }
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/editor-decorations.css" />
  <link rel="stylesheet" href="css/theme-transition.css" />
  <link rel="stylesheet" href="css/graphic-novel.css" />
  <script>
    // フォント読み込み: ローカル優先、失敗時のみ Google Fonts へフォールバック
    (function () {
      try {
        var isEmbed = /(?:^|[?&])embed=1(?:&|$)/.test(location.search);
        if (isEmbed) return;
        var head = document.getElementsByTagName('head')[0];
        function appendStylesheet(href, onError) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          if (typeof onError === 'function') link.onerror = onError;
          head.appendChild(link);
          return link;
        }
        function appendGoogleFonts() {
          if (head.getAttribute('data-fonts-cdn') === '1') return;
          head.setAttribute('data-fonts-cdn', '1');
          var l1 = document.createElement('link');
          l1.rel = 'preconnect';
          l1.href = 'https://fonts.googleapis.com';
          var l2 = document.createElement('link');
          l2.rel = 'preconnect';
          l2.href = 'https://fonts.gstatic.com';
          l2.crossOrigin = '';
          var css = document.createElement('link');
          css.rel = 'stylesheet';
          css.href = 'https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap';
          head.appendChild(l1);
          head.appendChild(l2);
          head.appendChild(css);
        }
        // ?fonts=cdn でCDNを明示利用
        if (/(?:^|[?&])fonts=cdn(?:&|$)/.test(location.search)) {
          appendGoogleFonts();
          return;
        }
        var fallbackTriggered = false;
        function fallbackToCdn() {
          if (fallbackTriggered) return;
          fallbackTriggered = true;
          appendGoogleFonts();
        }
        appendStylesheet('vendor/fonts/400.css', fallbackToCdn);
        appendStylesheet('vendor/fonts/700.css', fallbackToCdn);
      } catch (_) { }
    })();
  </script>
</head>

        var s = document.createElement('script');
        s.src = src;
        // 動的 script は async=false で挿入順の実行を保証
        s.async = false;
        document.body.appendChild(s);
      }
      document.addEventListener('DOMContentLoaded', function () {
        load('js/outline.js');
        load('js/themes-advanced.js');
        load('js/plugins/registry.js');
        load('js/images.js');
        load('js/panels.js');
        load('js/main-hub-panel.js');
        load('js/plugin-api.js');
        load('js/plugin-manager.js');
        // bootstrap は plugin-manager.js 内で自動実行
      }, { once: true });
    })();
  </script>
  <script>
    // PWA install support (localhost / https only)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // 開発モード判定
        var isDev = location.hostname === 'localhost' ||
                    location.hostname === '127.0.0.1' ||
                    location.protocol === 'file:';

        // ?clearCache=1 でService Workerのキャッシュをクリア
        if (isDev && /(?:^|[?&])clearCache=1(?:&|$)/.test(location.search)) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(registration) {
              registration.unregister();
            });
          });
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name);
            });
          }).then(function() {
            // クエリパラメータを削除してリロード
            var url = location.origin + location.pathname;
            location.replace(url);
          });
          return;
        }

        // 開発時は Service Worker を登録しない（キャッシュ汚染防止）
        var forceSW = /(?:^|[?&])useSW=1(?:&|$)/.test(location.search);
        if (isDev && !forceSW) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(registration) {
              registration.unregister();
            });
          }).catch(function () { });
          return;
        }

        navigator.serviceWorker.register('/sw.js').catch(function () { });
      });
    }
  </script>
