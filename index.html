<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2f6b4f" />
  <title>Zen Writer - 小説執筆ツール</title>
  <script>
    (function () {
      // ?reset=1でlocalStorageをクリア
      if (/(?:^|[?&])reset=1(?:&|$)/.test(location.search)) {
        try {
          localStorage.clear();
          // クエリパラメータを削除してリロード
          var url = location.origin + location.pathname;
          location.replace(url);
          return;
        } catch (e) { /* ignore */ }
      }

      // 埋め込みモード判定（?embed=1）
      var isEmbed = /(?:^|[?&])embed=1(?:&|$)/.test(location.search);
      if (isEmbed) {
        document.documentElement.setAttribute('data-embed', 'true');
      }
      try {
        var raw = localStorage.getItem('zenWriter_settings');
        var settings = null;
        if (raw) {
          settings = JSON.parse(raw);
        }

        // テーマ設定（デフォルト: dark）
        var theme = settings && settings.theme ? settings.theme : 'dark';
        document.documentElement.setAttribute('data-theme', theme);

        // ツールバー設定
        if (settings && settings.toolbarVisible === false) {
          document.documentElement.setAttribute('data-toolbar-hidden', 'true');
        } else {
          document.documentElement.setAttribute('data-toolbar-hidden', 'false');
        }
      } catch (e) {
        // エラー時はデフォルトでダークモード
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.setAttribute('data-toolbar-hidden', 'false');
      }
      // 埋め込みモードではツールバーを強制的に隠す（最小UI）
      if (isEmbed) {
        document.documentElement.setAttribute('data-toolbar-hidden', 'true');
      }
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/editor-decorations.css" />
  <link rel="stylesheet" href="css/theme-transition.css" />
  <script>
    // 非埋め込み時のみ Google Fonts を動的に読み込む（preconnect 最適化込み）
    (function () {
      try {
        var isEmbed = /(?:^|[?&])embed=1(?:&|$)/.test(location.search);
        if (isEmbed) return;
        var head = document.getElementsByTagName('head')[0];
        var l1 = document.createElement('link');
        l1.rel = 'preconnect';
        l1.href = 'https://fonts.googleapis.com';
        var l2 = document.createElement('link');
        l2.rel = 'preconnect';
        l2.href = 'https://fonts.gstatic.com';
        l2.crossOrigin = '';
        var css = document.createElement('link');
        css.rel = 'stylesheet';
        css.href =
          'https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap';
        head.appendChild(l1);
        head.appendChild(l2);
        head.appendChild(css);
      } catch (_) { }
    })();
  </script>
</head>

<body>
  <div class="app-container">
    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar" role="complementary" aria-label="設定パネル">
      <div class="sidebar-header">
        <h2 data-i18n="GADGET_SETTINGS"></h2>
        <!-- ヘッダーの閉じるボタンを削除：ツールバー側に統一 -->
      </div>

      <div class="sidebar-top">
        <!-- タブ切り替えUI -->
        <div class="sidebar-tabs" role="tablist" aria-label="設定カテゴリ"></div>
      </div>

      <div class="sidebar-groups">
        <section class="sidebar-group active" data-group="structure" id="sidebar-group-structure" role="tabpanel"
          aria-labelledby="sidebar-tab-structure">
          <div class="sidebar-section">
            <div id="structure-gadgets-panel" class="gadgets-panel" data-gadget-group="structure" aria-label="構造ガジェット">
            </div>
          </div>
        </section>

        <section class="sidebar-group" data-group="wiki" id="sidebar-group-wiki" role="tabpanel"
          aria-labelledby="sidebar-tab-wiki" aria-hidden="true">
          <div class="sidebar-section">
            <div id="wiki-gadgets-panel" class="gadgets-panel" data-gadget-group="wiki" aria-label="Wikiガジェット"></div>
          </div>
        </section>

        <section class="sidebar-group" data-group="assist" id="sidebar-group-assist" role="tabpanel"
          aria-labelledby="sidebar-tab-assist" aria-hidden="true">
          <div class="sidebar-section">
            <div id="assist-gadgets-panel" class="gadgets-panel" data-gadget-group="assist" aria-label="アシストガジェット">
            </div>
          </div>
        </section>

        <section class="sidebar-group" data-group="typography" id="sidebar-group-typography" role="tabpanel"
          aria-labelledby="sidebar-tab-typography" aria-hidden="true">
          <div class="sidebar-section">
            <div id="typography-gadgets-panel" class="gadgets-panel" data-gadget-group="typography"
              aria-label="タイポグラフィガジェット"></div>
          </div>
        </section>
      </div>
    </aside>

    <!-- サイドバーオーバーレイ（モバイル用） -->
    <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <!-- ツールバー -->
      <div class="toolbar" role="toolbar" aria-label="メインツールバー" id="toolbar">
        <div class="sidebar-controls">
          <button id="toggle-sidebar" class="icon-button iconified" aria-label="サイドバーを開閉" aria-expanded="false"
            aria-controls="sidebar" title="メニュー">
            <i data-lucide="menu" aria-hidden="true"></i>
          </button>
        </div>
        <div class="word-count" role="status" aria-live="polite" aria-atomic="true">0 文字</div>
        <div id="goal-progress" class="goal-progress" aria-hidden="true" style="display: none" role="progressbar"
          aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="執筆目標の進捗">
          <div class="goal-progress__track">
            <div class="goal-progress__bar" style="width: 0%"></div>
          </div>
        </div>
        <label for="goal-target" class="sr-only">目標文字数</label>
        <input type="number" id="goal-target" min="0" data-i18n-placeholder="GOAL_TARGET_PLACEHOLDER" aria-hidden="true"
          style="width: 100px; margin-right: 8px; display: none;" aria-label="目標文字数" />
        <label for="goal-deadline" class="sr-only">締切日</label>
        <input type="date" id="goal-deadline" aria-label="締切日" aria-hidden="true"
          style="margin-right: 8px; display: none;" />
        <div class="toolbar-actions">
          <div class="toolbar-group toolbar-group--mode" aria-label="表示モード">
            <span class="toolbar-group-label" data-i18n="MODE_TITLE">表示</span>
            <label for="ui-mode-select" class="sr-only">表示モード</label>
            <select id="ui-mode-select" aria-label="表示モード" title="表示モード">
              <option value="normal" data-i18n="MODE_NORMAL">通常モード</option>
              <option value="focus" data-i18n="MODE_FOCUS">フォーカスモード</option>
              <option value="blank" data-i18n="MODE_BLANK">ブランクモード</option>
            </select>
          </div>

          <div class="toolbar-group toolbar-group--decorate" aria-label="装飾">
            <span class="toolbar-group-label">装飾</span>
            <button id="toggle-font-decoration" class="icon-button iconified" title="フォント装飾" aria-label="フォント装飾パネルを開く">
              <i data-lucide="highlighter" aria-hidden="true"></i>
            </button>
            <button id="toggle-text-animation" class="icon-button iconified" title="テキストアニメーション" aria-label="テキストアニメーションパネルを開く">
              <i data-lucide="sparkles" aria-hidden="true"></i>
            </button>
          </div>

          <div class="toolbar-group toolbar-group--editor" aria-label="編集">
            <span class="toolbar-group-label">編集</span>
            <button id="toggle-preview" class="icon-button iconified" title="プレビュー" aria-label="プレビューを切り替え" aria-expanded="false" aria-controls="editor-preview">
              <i data-lucide="layout-template" aria-hidden="true"></i>
            </button>
            <button id="toggle-split-view" class="icon-button iconified" title="分割ビュー" aria-label="分割ビューを切り替え" aria-expanded="false" aria-controls="split-view-container">
              <i data-lucide="columns" aria-hidden="true"></i>
            </button>
            <button id="toggle-wysiwyg" class="icon-button iconified" title="リッチテキスト編集" aria-label="リッチテキスト編集を切り替え" aria-pressed="false">
              <i data-lucide="pen-tool" aria-hidden="true"></i>
            </button>
          </div>

          <div class="toolbar-group toolbar-group--system" aria-label="環境と表示">
            <span class="toolbar-group-label">環境/表示</span>
            <button id="toggle-settings" class="icon-button iconified" title="設定" aria-label="設定を開く">
              <i data-lucide="settings" aria-hidden="true"></i>
            </button>
            <button id="toggle-help-modal" class="icon-button iconified" title="ヘルプ" aria-label="ヘルプを開く">
              <i data-lucide="help-circle" aria-hidden="true"></i>
            </button>
            <button id="toggle-theme" class="icon-button iconified" title="テーマを切り替え" aria-label="ライト/ダークモードを切り替え">
              <i data-lucide="moon" aria-hidden="true"></i>
            </button>
            <button id="fullscreen" class="icon-button iconified" title="全画面表示" aria-label="全画面表示を切り替え">
              <i data-lucide="maximize" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- 分割ビューコンテナ -->
      <div id="split-view-container" class="split-view-container" style="display: none;">
        <div id="split-view-left" class="split-view-panel split-view-panel--left"></div>
        <div id="split-view-resize-handle" class="split-view-resize-handle" role="separator" aria-label="分割ビューのリサイズハンドル"
          aria-orientation="vertical" tabindex="0"></div>
        <div id="split-view-right" class="split-view-panel split-view-panel--right"></div>
      </div>

      <!-- 分割ビューモード選択パネル（統合メインハブパネルに移行したためコメントアウト） -->
      <!--
      <div id="split-view-mode-panel" class="floating-panel" style="display: none;" role="dialog"
        aria-labelledby="split-view-mode-panel-title" aria-modal="true">
        <div class="panel-header">
          <span id="split-view-mode-panel-title">分割ビューモード</span>
          <button class="panel-close" id="close-split-view-mode-panel" aria-label="分割ビューモードパネルを閉じる">閉じる</button>
        </div>
        <div class="panel-body">
          <div class="panel-row">
            <button id="split-view-edit-preview" class="small" type="button">編集/プレビュー</button>
            <button id="split-view-chapter-compare" class="small" type="button">章間比較</button>
            <button id="split-view-snapshot-diff" class="small" type="button">スナップショット差分</button>
          </div>
        </div>
      </div>
      -->

      <!-- エディタエリア -->
      <div class="editor-container" role="region" aria-label="エディタ">
        <textarea id="editor" data-i18n-placeholder="EDITOR_PLACEHOLDER" aria-label="テキストエディタ" role="textbox"
          aria-multiline="true" tabindex="0"></textarea>
        <!-- WYSIWYGエディタ -->
        <div id="wysiwyg-editor" class="wysiwyg-editor" contenteditable="true" style="display: none;"
          data-i18n-placeholder="EDITOR_PLACEHOLDER" role="textbox" aria-label="リッチテキストエディタ" aria-multiline="true">
        </div>
        <!-- WYSIWYGツールバー -->
        <div id="wysiwyg-toolbar" class="wysiwyg-toolbar" style="display: none;" role="toolbar"
          aria-label="リッチテキスト編集ツールバー">
          <button id="wysiwyg-bold" class="wysiwyg-btn" type="button" title="太字" aria-label="太字">
            <i data-lucide="bold" aria-hidden="true"></i>
          </button>
          <button id="wysiwyg-italic" class="wysiwyg-btn" type="button" title="斜体" aria-label="斜体">
            <i data-lucide="italic" aria-hidden="true"></i>
          </button>
          <button id="wysiwyg-underline" class="wysiwyg-btn" type="button" title="下線" aria-label="下線">
            <i data-lucide="underline" aria-hidden="true"></i>
          </button>
          <div class="wysiwyg-separator"></div>
          <button id="wysiwyg-link" class="wysiwyg-btn" type="button" title="リンク" aria-label="リンク">
            <i data-lucide="link" aria-hidden="true"></i>
          </button>
          <div class="wysiwyg-separator"></div>
          <button id="wysiwyg-switch-to-textarea" class="wysiwyg-btn" type="button" title="テキストエディタに切り替え"
            aria-label="テキストエディタに切り替え">
            <i data-lucide="code" aria-hidden="true"></i>
          </button>
        </div>
        <div id="editor-overlay" class="editor-overlay" aria-hidden="true"></div>
        <div id="editor-mirror" class="editor-mirror" aria-hidden="true"></div>
        <div id="editor-preview" class="editor-preview editor-preview--collapsed" aria-live="polite"
          aria-label="プレビューパネル" role="region">
          <div id="editor-preview-body" class="editor-preview__body">
            <div id="markdown-preview-panel" class="markdown-preview-panel" role="article" aria-label="Markdownプレビュー">
            </div>
            <div id="images-preview-panel" class="images-preview-panel" role="region" aria-label="画像プレビュー"></div>
          </div>
        </div>
        <div id="print-view" class="print-view" aria-hidden="true"></div>
      </div>
    </main>
  </div>

  <!-- 設定モーダル -->
  <div id="settings-modal" class="modal-overlay" style="display: none" role="dialog"
    aria-labelledby="settings-modal-title" aria-modal="true">
    <div class="modal-dialog modal-dialog--large">
      <div class="modal-header">
        <h2 id="settings-modal-title" data-i18n="SETTINGS_TITLE">設定</h2>
        <button class="modal-close" id="close-settings-modal" aria-label="設定を閉じる">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div id="settings-gadgets-panel" class="gadgets-panel" data-gadget-group="settings" aria-label="設定ガジェット">
        </div>
      </div>
    </div>
  </div>

  <!-- ヘルプモーダル -->
  <div id="help-modal" class="modal-overlay" style="display: none" role="dialog" aria-labelledby="help-modal-title"
    aria-modal="true">
    <div class="modal-dialog modal-dialog--large">
      <div class="modal-header">
        <h2 id="help-modal-title" data-i18n="HELP_TITLE">ヘルプ</h2>
        <button class="modal-close" id="close-help-modal" aria-label="ヘルプを閉じる">&#x2715;</button>
      </div>
      <div class="modal-body" id="help-modal-body"></div>
    </div>
  </div>

  <!-- 統合メインハブパネル -->
  <div id="main-hub-panel" class="floating-panel main-hub-panel" style="display: none" role="dialog"
    aria-labelledby="main-hub-panel-title" aria-modal="true">
    <div class="panel-header">
      <span id="main-hub-panel-title">ツールパネル</span>
      <button class="panel-close" id="close-main-hub-panel" aria-label="ツールパネルを閉じる">閉じる</button>
    </div>
    <div class="panel-tabs" role="tablist" aria-label="ツールタブ">
      <button class="panel-tab active" data-tab="quick-tools" role="tab" aria-selected="true" aria-controls="tab-quick-tools">クイックツール</button>
      <button class="panel-tab" data-tab="search" role="tab" aria-selected="false" aria-controls="tab-search">検索</button>
      <button class="panel-tab" data-tab="decoration" role="tab" aria-selected="false" aria-controls="tab-decoration">装飾</button>
      <button class="panel-tab" data-tab="animation" role="tab" aria-selected="false" aria-controls="tab-animation">アニメーション</button>
      <button class="panel-tab" data-tab="global-search" role="tab" aria-selected="false" aria-controls="tab-global-search">全文検索</button>
      <button class="panel-tab" data-tab="split-view" role="tab" aria-selected="false" aria-controls="tab-split-view">分割ビュー</button>
    </div>
    <div class="panel-body">
      <!-- クイックツールタブ -->
      <div id="tab-quick-tools" class="tab-content active" role="tabpanel" aria-labelledby="tab-quick-tools">
        <section class="panel-section">
          <h4 class="panel-section__title" data-i18n="EDITOR_FONT">エディタフォント</h4>
          <input type="range" id="global-font-size" min="12" max="48" value="16" />
          <div class="panel-row">
            <input type="number" id="global-font-size-number" min="12" max="48" value="16" style="width: 72px" />
            px
          </div>
          <div class="panel-hint" data-i18n="HINT_FONT_SIZE_SHORTCUT">Ctrl+Plus/Minus でも調整可能</div>
        </section>
        <section class="panel-section">
          <h4 class="panel-section__title" data-i18n="HUD_CONTROL">HUD制御</h4>
          <div class="panel-row panel-row--wrap">
            <button id="hud-toggle-visibility" class="small" type="button" data-i18n="HUD_TOGGLE">HUD表示切替</button>
            <button id="hud-pin-toggle" class="small" type="button" data-i18n="HUD_PIN">HUDピン</button>
          </div>
          <div class="panel-row panel-row--wrap">
            <button id="hud-refresh" class="small" type="button" data-i18n="HUD_REFRESH">HUD更新</button>
          </div>
          <div class="panel-hint" data-i18n="HINT_HUD_PIN">HUDをピン留めして常時表示できます</div>
        </section>
      </div>

      <!-- 検索タブ -->
      <div id="tab-search" class="tab-content" role="tabpanel" aria-labelledby="tab-search" style="display: none">
        <label for="search-input" class="sr-only">検索語</label>
        <input type="text" id="search-input" data-i18n-placeholder="SEARCH_PLACEHOLDER" placeholder="検索..." aria-label="検索語を入力" />
        <label for="replace-input" class="sr-only">置換語</label>
        <input type="text" id="replace-input" data-i18n-placeholder="REPLACE_PLACEHOLDER" placeholder="置換..." aria-label="置換語を入力" />
        <div class="panel-row">
          <label style="margin-right: 1rem"><input type="checkbox" id="search-case-sensitive" />
            <span data-i18n="CASE_SENSITIVE">大文字小文字を区別</span></label>
          <label><input type="checkbox" id="search-regex" /> <span data-i18n="REGEX">正規表現</span></label>
        </div>
        <div class="panel-row">
          <button id="replace-single" class="small" type="button" data-i18n="APPLY">適用</button>
          <button id="replace-all" class="small" type="button" data-i18n="REPLACE_ALL">すべて置換</button>
          <button id="search-prev" class="small" type="button" data-i18n="PREV">前へ</button>
          <button id="search-next" class="small" type="button" data-i18n="NEXT">次へ</button>
        </div>
        <div class="panel-hint">
          <span id="match-count" data-i18n="SEARCH_NO_RESULTS">結果なし</span><br />
          <small data-i18n="HINT_SEARCH_SHORTCUT">Ctrl+F で検索を開く</small>
        </div>
      </div>

      <!-- 装飾タブ -->
      <div id="tab-decoration" class="tab-content" role="tabpanel" aria-labelledby="tab-decoration" style="display: none">
        <div class="panel-row">
          <button id="decor-bold" class="decor-btn" data-tag="bold" data-i18n-title="DECOR_BOLD_TITLE" title="太字">B</button>
          <button id="decor-italic" class="decor-btn" data-tag="italic" data-i18n-title="DECOR_ITALIC_TITLE" title="斜体">I</button>
          <button id="decor-underline" class="decor-btn" data-tag="underline" data-i18n-title="DECOR_UNDERLINE_TITLE" title="下線">U</button>
          <button id="decor-strike" class="decor-btn" data-tag="strike" data-i18n-title="DECOR_STRIKE_TITLE" title="取り消し線">S</button>
          <button id="decor-black" class="decor-btn" data-tag="black" data-i18n-title="DECOR_BLACK_TITLE" title="極太">極</button>
        </div>
        <div class="panel-row">
          <button id="decor-light" class="decor-btn" data-tag="light" data-i18n-title="DECOR_LIGHT_TITLE" title="細字">細</button>
          <button id="decor-smallcaps" class="decor-btn" data-tag="smallcaps" data-i18n-title="DECOR_SMALLCAPS_TITLE" title="スモールキャップス">SC</button>
          <button id="decor-shadow" class="decor-btn" data-tag="shadow" data-i18n-title="DECOR_SHADOW_TITLE" title="影">影</button>
          <button id="decor-outline" class="decor-btn" data-tag="outline" data-i18n-title="DECOR_OUTLINE_TITLE" title="輪郭">輪</button>
          <button id="decor-glow" class="decor-btn" data-tag="glow" data-i18n-title="DECOR_GLOW_TITLE" title="光彩">光</button>
        </div>
        <div class="panel-row">
          <button id="decor-uppercase" class="decor-btn" data-tag="uppercase" data-i18n-title="DECOR_UPPERCASE_TITLE" title="大文字">大</button>
          <button id="decor-lowercase" class="decor-btn" data-tag="lowercase" data-i18n-title="DECOR_LOWERCASE_TITLE" title="小文字">小</button>
          <button id="decor-capitalize" class="decor-btn" data-tag="capitalize" data-i18n-title="DECOR_CAPITALIZE_TITLE" title="先頭大文字">頭</button>
          <button id="decor-wide" class="decor-btn" data-tag="wide" data-i18n-title="DECOR_WIDE_TITLE" title="字間広げる">広</button>
          <button id="decor-narrow" class="decor-btn" data-tag="narrow" data-i18n-title="DECOR_NARROW_TITLE" title="字間狭める">狭</button>
        </div>
        <div class="panel-hint" data-i18n="HINT_DECORATION">テキストを選択してから装飾ボタンをクリック</div>
      </div>

      <!-- アニメーションタブ -->
      <div id="tab-animation" class="tab-content" role="tabpanel" aria-labelledby="tab-animation" style="display: none">
        <div class="panel-row">
          <button id="anim-fade" class="decor-btn" data-tag="fade" data-i18n-title="ANIM_FADE_TITLE" title="フェード">フェード</button>
          <button id="anim-slide" class="decor-btn" data-tag="slide" data-i18n-title="ANIM_SLIDE_TITLE" title="スライド">スライド</button>

  <script>
    // PWA install support (localhost / https only)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // 開発モード判定
        var isDev = location.hostname === 'localhost' ||
                    location.hostname === '127.0.0.1' ||
                    location.protocol === 'file:';

        // ?clearCache=1 でService Workerのキャッシュをクリア
        if (isDev && /(?:^|[?&])clearCache=1(?:&|$)/.test(location.search)) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(registration) {
              registration.unregister();
            });
          });
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name);
            });
          }).then(function() {
            // クエリパラメータを削除してリロード
            var url = location.origin + location.pathname;
            location.replace(url);
          });
          return;
        }

        navigator.serviceWorker.register('/sw.js').catch(function () { });
      });
    }
  </script>
