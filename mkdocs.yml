site_name: WritingPage Local Docs View
site_description: Local-only Markdown review and browser translation surface for WritingPage.
site_url: http://127.0.0.1:8000/
docs_dir: docs
site_dir: ../WritingPage-mkdocs-site
strict: false
use_directory_urls: true

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal

plugins:
  - search:
      lang:
        - ja
        - en

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences

exclude_docs: |
  .agents/**
  .claude/**
  .codex/**
  .cursor/**
  .git/**
  .github/**
  .serena/**
  .shared-workflows/**
  __pycache__/**
  .cache/**
  .tmp/**
  .tmp-playwright-libs/**
  .venv/**
  build/**
  build-*/**
  build-session*/**
  css/**
  dist/**
  e2e/**
  electron/**
  js/**
  node_modules/**
  playwright-report/**
  scripts/**
  shared-workflows/**
  test/**
  test-artifacts/**
  test-results/**
  tmp/**
  tools/**
  vendor/**
  venv/**
  debug-*.html
  debug-*.md
  debug-*.png
  embed-demo.html
  embed-xorigin-demo.html
  favicon.svg
  index.html
  LICENSE
  manifest.webmanifest
  mkdocs.yml
  nul
  package-lock.json
  package.json
  playwright.config.js
  /README.md
  start-server.bat
  sw.js
  VERSION
  *.bat
  *.css
  *.html
  *.js
  *.json
  *.lock
  *.png
  *.svg
  *.txt
  .editorconfig
  .eslintignore
  .eslintrc.js
  .eslintrc.json
  .gitattributes
  .gitignore
  .markdownlint.json
  .markdownlintignore
  .prettierignore
  .prettierrc

