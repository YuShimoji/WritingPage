<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Writer Feature Reference</title>
<style>
  :root {
    --bg: #0a0f14; --surface: #111820; --surface2: #1a222d;
    --border: #1e2936; --accent: #7eb8da; --green: #6ec87a;
    --orange: #d4a054; --red: #d46a6a; --purple: #b09ae0;
    --teal: #5ec4b6; --text: #d0dae5; --muted: #5a7088;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 48px; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: .85rem; font-weight: 700; color: var(--accent); }
  .logo span { color: var(--muted); font-weight: 300; }
  .search { flex: 1; max-width: 320px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: .35rem .7rem; font-size: .8rem; color: var(--text); outline: none; }
  .search:focus { border-color: var(--accent); }
  .stats-bar { display: flex; gap: 1rem; margin-left: auto; font-size: .72rem; font-family: monospace; }
  .stat-item { display: flex; align-items: center; gap: .3rem; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

  .layout { display: flex; min-height: calc(100vh - 48px); }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: .8rem 0; position: sticky; top: 48px; height: calc(100vh - 48px); overflow-y: auto; flex-shrink: 0; }
  .sb-label { font-size: .6rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; padding: 0 .9rem .3rem; margin-top: .8rem; }
  .sb-item { display: flex; align-items: center; gap: .5rem; padding: .3rem .9rem; font-size: .78rem; color: var(--muted); cursor: pointer; border-left: 2px solid transparent; transition: .1s; }
  .sb-item:hover { color: var(--text); background: var(--surface2); }
  .sb-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
  .sb-count { margin-left: auto; font-size: .6rem; font-family: monospace; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0 .35rem; }

  .main { flex: 1; padding: 1.5rem; max-width: 900px; }
  .section { margin-bottom: 2rem; }
  .section-title { font-size: 1rem; font-weight: 700; padding-bottom: .5rem; border-bottom: 1px solid var(--border); margin-bottom: .8rem; display: flex; align-items: center; gap: .5rem; }
  .section-title .icon { font-size: 1.1rem; }

  .feature-grid { display: flex; flex-direction: column; gap: .5rem; }
  .feature-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .7rem .9rem; transition: border-color .15s; }
  .feature-card:hover { border-color: var(--accent); }
  .feature-card.done { border-left: 3px solid var(--green); }
  .feature-card.partial { border-left: 3px solid var(--orange); }
  .feature-card.todo { border-left: 3px solid var(--muted); }
  .fc-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .3rem; }
  .fc-name { font-weight: 600; font-size: .85rem; }
  .fc-status { font-size: .6rem; font-family: monospace; padding: .1rem .4rem; border-radius: 3px; }
  .fc-status.done { background: rgba(110,200,122,.15); color: var(--green); }
  .fc-status.partial { background: rgba(212,160,84,.15); color: var(--orange); }
  .fc-status.todo { background: rgba(90,112,136,.15); color: var(--muted); }
  .fc-pct { font-size: .6rem; font-family: monospace; color: var(--muted); }
  .fc-desc { font-size: .78rem; color: var(--muted); line-height: 1.5; }
  .fc-tags { display: flex; gap: .3rem; margin-top: .3rem; flex-wrap: wrap; }
  .fc-tag { font-size: .6rem; font-family: monospace; padding: .05rem .3rem; border-radius: 3px; border: 1px solid var(--border); color: var(--muted); }
  .fc-files { font-size: .65rem; font-family: monospace; color: var(--muted); margin-top: .3rem; }

  .progress-bar { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: .3rem; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .progress-fill.done { background: var(--green); }
  .progress-fill.partial { background: var(--orange); }

  .gadget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .5rem; }
  .gadget-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: .5rem .7rem; font-size: .78rem; }
  .gadget-card .gc-name { font-weight: 600; font-size: .8rem; }
  .gadget-card .gc-group { font-size: .6rem; color: var(--purple); font-family: monospace; }
  .gadget-card .gc-desc { font-size: .72rem; color: var(--muted); margin-top: .2rem; }

  #no-results { display: none; text-align: center; padding: 2rem; color: var(--muted); }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Zen Writer <span>Feature Reference v0.3.29</span></div>
  <input class="search" id="search" placeholder="Search features..." autocomplete="off">
  <div class="stats-bar" id="stats-bar"></div>
</div>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div id="no-results">No matching features found.</div>
  </main>
</div>
<script>

  { section: 'expression', name: 'パステキスト', status: 'partial', pct: 90, sp: 'SP-073', desc: ':::zw-pathtext{path} 構文。SVG textPath。プリセット7種。WYSIWYG制御点ハンドル。右クリックメニュー。残: Phase 4 フリーハンド。', files: ['js/modules/editor/PathHandleOverlay.js'] },
  { section: 'expression', name: 'DSL挿入GUI + 属性モーダル', status: 'done', pct: 100, desc: 'TBドロップダウンから4種 (typing/dialog/scroll/pathtext) を挿入。属性設定モーダル付き。', files: ['js/editor-wysiwyg.js'] },
  { section: 'expression', name: 'テクスチャオーバーレイ', status: 'done', pct: 100, sp: 'SP-074', desc: 'テキストボックスへの視覚テクスチャ適用。@keyframes embed対応。', files: ['js/modules/editor/TextboxEffectRenderer.js'] },

  { section: 'typography', name: 'フォント切替', status: 'done', pct: 100, desc: 'Phase 0。ローカルフォント対応。', files: ['js/gadgets-typography.js'] },

  // === UI/UX ===
  { section: 'ui', name: 'サイドバー 6カテゴリ', status: 'done', pct: 100, desc: 'sections/structure/edit/theme/assist/advanced。アコーディオン展開。', files: ['js/sidebar-manager.js'] },
  { section: 'ui', name: 'ドックパネル', status: 'partial', pct: 75, sp: 'SP-076', desc: '左右ドック + タブグループ + フローティング&スナップ。残: Phase 4 上下ドック。', files: ['js/dock-manager.js', 'css/dock-panel.css'] },
  { section: 'ui', name: 'テーマシステム', status: 'done', pct: 100, desc: 'ライト/ダーク/セピア/ハイコントラスト。CSS変数ベース。JS硬コード色撲滅済み。', files: ['js/theme.js', 'css/style.css'] },
  { section: 'ui', name: 'px→rem 段階移行', status: 'done', pct: 100, desc: 'Phase 1-3 完了。font-size + padding/margin + width/height/gap/border-radius。', files: ['css/*.css'] },
  { section: 'ui', name: 'Reader プレビュー', status: 'done', pct: 100, sp: 'SP-078', desc: '第4モード。全装飾レンダリング。目次/ナビ生成。HTMLエクスポート。', files: ['js/reader-preview.js'] },
  { section: 'ui', name: 'コマンドパレット', status: 'done', pct: 100, desc: 'Ctrl+K で起動。コマンド検索+実行。', files: ['js/command-palette.js'] },

  // === ストレージ ===
  { section: 'storage', name: 'IndexedDB 全面移行', status: 'done', pct: 100, sp: 'SP-077', desc: 'メモリキャッシュ + 非同期IDBフラッシュ + localStorageフォールバック。', files: ['js/storage-idb.js', 'js/storage.js'] },
  { section: 'storage', name: 'ドキュメント階層管理', status: 'done', pct: 100, desc: 'ツリー構造。フォルダ対応。ドラッグ&ドロップ。', files: ['js/gadgets-documents-hierarchy.js', 'js/gadgets-documents-tree.js'] },

  // === エクスポート ===
  { section: 'export', name: 'HTML/TXT/MD エクスポート', status: 'done', pct: 100, desc: 'Reader Preview 経由のHTML。テキスト/Markdownエクスポート。', files: ['js/reader-preview.js'] },
  { section: 'export', name: 'ブラウザ印刷 (PDF)', status: 'done', pct: 100, desc: 'ブラウザの印刷APIでPDF出力。', files: ['js/gadgets-print.js'] },

  // === ガジェットシステム ===
  { section: 'gadgets', name: 'ガジェットシステム', status: 'done', pct: 100, desc: '33個登録。6カテゴリ。ロードアウトプリセット。manifest駆動。', files: ['js/gadgets-init.js', 'js/gadgets-builtin.js'] },
  { section: 'gadgets', name: 'プラグインシステム', status: 'done', pct: 100, desc: 'PluginAPI (gadgets/themes/storage/events)。ZWPlugin正規API + ZenWriterPlugins簡易レジストリ。', files: ['js/plugin-manager.js', 'js/plugin-api.js'] },
];

var SECTIONS = [
  { id: 'editor', label: 'Editor Core', icon: 'E' },
  { id: 'chapter', label: 'Chapter Management', icon: 'C' },
  { id: 'expression', label: 'Expression / Effects', icon: 'X' },
  { id: 'typography', label: 'Typography', icon: 'T' },
  { id: 'wiki', label: 'Story Wiki', icon: 'W' },
  { id: 'ui', label: 'UI / UX', icon: 'U' },
  { id: 'storage', label: 'Storage', icon: 'S' },
  { id: 'export', label: 'Export', icon: 'O' },
  { id: 'gadgets', label: 'Gadgets / Plugins', icon: 'G' },
];

// ---- Gadgets ----
var GADGETS = [
  { name: 'SectionsNavigator', title: 'セクションナビ', group: 'sections' },
  { name: 'Outline', title: 'アウトライン', group: 'structure' },
  { name: 'Documents', title: 'ドキュメント', group: 'structure' },
  { name: 'StoryWiki', title: 'Story Wiki', group: 'structure' },
  { name: 'TagsAndSmartFolders', title: 'タグ/スマートフォルダ', group: 'structure' },
  { name: 'SnapshotManager', title: 'スナップショット', group: 'structure' },

  { name: 'Typography', title: 'タイポグラフィ', group: 'theme' },

  { name: 'VisualProfile', title: 'ビジュアルプロファイル', group: 'theme' },
  { name: 'HeadingStyles', title: '見出しスタイル', group: 'theme' },
  { name: 'WritingGoal', title: '執筆目標', group: 'assist' },
  { name: 'Typewriter', title: 'タイプライター', group: 'assist' },
  { name: 'FocusMode', title: 'フォーカス', group: 'assist' },
  { name: 'HUDSettings', title: 'HUD設定', group: 'assist' },

// ---- Render ----
function renderStats() {
  var bar = document.getElementById('stats-bar');
  var done = FEATURES.filter(f => f.status === 'done').length;
  var partial = FEATURES.filter(f => f.status === 'partial').length;
  var todo = FEATURES.filter(f => f.status === 'todo').length;
  bar.innerHTML =
    '<div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div>' + done + ' done</div>' +
    '<div class="stat-item"><div class="stat-dot" style="background:var(--orange)"></div>' + partial + ' partial</div>' +
    (todo ? '<div class="stat-item"><div class="stat-dot" style="background:var(--muted)"></div>' + todo + ' todo</div>' : '') +
    '<div class="stat-item" style="color:var(--accent)">' + FEATURES.length + ' total</div>';
}

function renderSidebar() {
  var sb = document.getElementById('sidebar');
  var html = '<div class="sb-label">Sections</div>';
  SECTIONS.forEach(function(sec) {
    var count = FEATURES.filter(f => f.section === sec.id).length;
    html += '<div class="sb-item" data-section="' + sec.id + '">' +
      '<span style="color:var(--accent);font-weight:600;width:1rem;text-align:center">' + sec.icon + '</span>' +
      sec.label +
      '<span class="sb-count">' + count + '</span></div>';
  });
  html += '<div class="sb-label" style="margin-top:1.5rem">Gadgets (33)</div>';
  var groups = ['sections', 'structure', 'edit', 'theme', 'assist', 'advanced'];
  groups.forEach(function(g) {
    var count = GADGETS.filter(gd => gd.group === g).length;
    html += '<div class="sb-item" data-gadget-group="' + g + '" style="font-size:.72rem">' +
      g + '<span class="sb-count">' + count + '</span></div>';
  });
  sb.innerHTML = html;

  sb.querySelectorAll('.sb-item[data-section]').forEach(function(el) {
    el.addEventListener('click', function() {
      var target = document.getElementById('section-' + el.dataset.section);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      sb.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    });
  });
}

function renderMain(filter) {
  var main = document.getElementById('main');
  var html = '';
  var anyVisible = false;
  filter = (filter || '').toLowerCase();

  SECTIONS.forEach(function(sec) {
    var features = FEATURES.filter(f => f.section === sec.id);
    if (filter) features = features.filter(f =>
      f.name.toLowerCase().includes(filter) ||
      (f.desc || '').toLowerCase().includes(filter) ||
      (f.sp || '').toLowerCase().includes(filter)
    );
    if (features.length === 0) return;
    anyVisible = true;

    html += '<div class="section" id="section-' + sec.id + '">';
    html += '<div class="section-title"><span class="icon" style="color:var(--accent)">' + sec.icon + '</span> ' + sec.label + '</div>';
    html += '<div class="feature-grid">';
    features.forEach(function(f) {
      html += '<div class="feature-card ' + f.status + '">';
      html += '<div class="fc-header">';
      html += '<span class="fc-name">' + f.name + '</span>';
      html += '<span class="fc-status ' + f.status + '">' + f.status + '</span>';
      if (f.pct !== undefined) html += '<span class="fc-pct">' + f.pct + '%</span>';
      if (f.sp) html += '<span class="fc-tag" style="color:var(--accent);border-color:var(--accent)">' + f.sp + '</span>';
      html += '</div>';
      html += '<div class="fc-desc">' + (f.desc || '') + '</div>';
      if (f.pct !== undefined && f.pct < 100) {
        html += '<div class="progress-bar"><div class="progress-fill ' + f.status + '" style="width:' + f.pct + '%"></div></div>';
      }
      if (f.files && f.files.length) {
        html += '<div class="fc-files">' + f.files.join(' / ') + '</div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });

  // Gadgets section
  if (!filter || 'gadget'.includes(filter) || GADGETS.some(g => g.title.toLowerCase().includes(filter) || g.name.toLowerCase().includes(filter))) {
    anyVisible = true;
    html += '<div class="section" id="section-gadgets"><div class="section-title"><span class="icon" style="color:var(--accent)">G</span> Gadgets (33)</div>';
    html += '<div class="gadget-grid">';
    GADGETS.forEach(function(g) {
      if (filter && !g.title.toLowerCase().includes(filter) && !g.name.toLowerCase().includes(filter) && !g.group.includes(filter)) return;
      html += '<div class="gadget-card"><div class="gc-name">' + g.title + '</div><div class="gc-group">' + g.group + ' / ' + g.name + '</div></div>';
    });
    html += '</div></div>';
  }

  main.innerHTML = html || '';
  document.getElementById('no-results').style.display = anyVisible ? 'none' : 'block';
}

// ---- Init ----
renderStats();
renderSidebar();
renderMain();

document.getElementById('search').addEventListener('input', function() {
  renderMain(this.value);
});
</script>
</body>
</html>
