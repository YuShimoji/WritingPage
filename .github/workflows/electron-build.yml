name: Electron Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (portable)
        run: npm run electron:build

      - name: Build Electron installer (NSIS)
        run: npm run electron:dist

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: zen-writer-win-portable
          path: build/win-unpacked/
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: zen-writer-win-installer
          path: |
            build/*.exe
            build/*.yml
          retention-days: 30

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: zen-writer-win-installer
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.yml
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
