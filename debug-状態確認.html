<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WritingPage - 状態確認</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
    .good { background: #e8f5e9; }
    .bad { background: #ffebee; }
    .warn { background: #fff3e0; }
    h2 { margin-top: 0; }
    pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>WritingPage - 状態確認ツール</h1>

  <div class="section">
    <h2>1. ブラウザキャッシュ</h2>
    <p>ハードリロードを実行してください：</p>
    <ul>
      <li>Windows/Linux: <kbd>Ctrl + Shift + R</kbd></li>
      <li>Mac: <kbd>Cmd + Shift + R</kbd></li>
    </ul>
    <button onclick="location.reload(true)">ハードリロード実行</button>
  </div>

  <div class="section" id="localStorage-section">
    <h2>2. LocalStorage確認</h2>
    <div id="localStorage-content"></div>
    <button onclick="clearToolbarSettings()">ツールバー設定をリセット</button>
    <button onclick="clearAllSettings()">全設定をクリア（注意）</button>
  </div>

  <div class="section" id="dom-section">
    <h2>3. DOM状態確認</h2>
    <div id="dom-content"></div>
  </div>

  <div class="section">
    <h2>4. アプリを開く</h2>
    <button onclick="location.href='index.html'">WritingPageを開く</button>
  </div>

  <script>
    // LocalStorageの内容を表示
    function displayLocalStorage() {
      const content = document.getElementById('localStorage-content');
      const keys = ['zenWriter:settings', 'zenwriter-wysiwyg-mode'];
      let html = '';

      keys.forEach(key => {
        const value = localStorage.getItem(key);
        if (value) {
          try {
            const parsed = JSON.parse(value);
            html += `<h3>${key}</h3>`;
            html += `<pre>${JSON.stringify(parsed, null, 2)}</pre>`;

            if (key === 'zenWriter:settings' && parsed.toolbarVisible === false) {
              html += `<p class="bad">⚠️ toolbarVisible が false に設定されています</p>`;
            }
            if (key === 'zenWriter:settings' && parsed.ui?.accordionState) {
              html += `<p class="good">✓ アコーディオン状態が保存されています</p>`;
            }
          } catch (e) {
            html += `<p class="warn">解析エラー: ${value}</p>`;
          }
        } else {
          html += `<p><strong>${key}:</strong> 未設定</p>`;
        }
      });

      content.innerHTML = html;
    }

    // ツールバー設定をリセット
    function clearToolbarSettings() {
      try {
        const settings = JSON.parse(localStorage.getItem('zenWriter:settings') || '{}');
        settings.toolbarVisible = true;
        localStorage.setItem('zenWriter:settings', JSON.stringify(settings));
        alert('ツールバー設定をリセットしました。アプリをリロードしてください。');
        displayLocalStorage();
      } catch (e) {
        alert('エラー: ' + e.message);
      }
    }

    // 全設定をクリア
    function clearAllSettings() {
      if (confirm('全ての設定をクリアします。文書データは削除されませんが、設定は初期化されます。よろしいですか？')) {
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && (key.startsWith('zenWriter') || key.startsWith('zenwriter'))) {
            keysToRemove.push(key);
          }
        }
        keysToRemove.forEach(key => localStorage.removeItem(key));
        alert(`${keysToRemove.length}個の設定をクリアしました。アプリをリロードしてください。`);
        displayLocalStorage();
      }
    }

    // 初期表示
    displayLocalStorage();
  </script>
</body>
</html>
